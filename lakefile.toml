name = "Incremental"
version = "0.1.0"
defaultTargets = ["incremental"]
testDriver = "IncrementalTests"

[[require]]
name = "batteries"
scope = "leanprover-community"
rev = "main"

[[lean_lib]]
name = "Incremental"

[[lean_lib]]
name = "IncrementalTests"
globs = ["IncrementalTests.+"]

[[lean_exe]]
name = "incremental"
root = "Main"
